spec:
  name: matgaming-landing
  services:
    - name: matgaming-web
      build_command: npm install && npm run build
      run_command: npm start
      environment_slug: node-js
      source_dir: /
      http_port: 3000
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      envs:
        - key: SMTP_HOST
          value: smtpout.secureserver.net
        - key: SMTP_PORT
          value: "465"
        - key: SMTP_USER
          type: SECRET
        - key: SMTP_PASS
          type: SECRET
        - key: SMTP_SECURE
          value: "true"
